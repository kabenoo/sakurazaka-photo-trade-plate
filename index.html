<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7ac70c" />
  <title>生写真交換プレート作成</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="hero-inner">
        <p class="eyebrow">櫻坂46</p>
        <h1>生写真交換プレート作成</h1>
        <p class="lead">メンバー選択・手入力を1枚にまとめます。</p>
      </div>
    </header>

    <section class="panel seek-panel" aria-labelledby="seek-title">
      <div class="section-title">
        <span class="heart">♥</span>
        <h2 id="seek-title">求</h2>
        <span class="kana">もとめ</span>
        <span class="heart">♥</span>
      </div>

      <div class="input-grid">
        <div class="field">
          <label for="seekSelect">メンバーを選ぶ</label>
          <div class="select-row">
            <select id="seekSelect">
              <option value="">メンバーを選択</option>
            </select>
            <button type="button" class="small-button green" data-add="seek">追加</button>
          </div>
          <div id="seekChips" class="chips" aria-live="polite"></div>
        </div>

        <div class="field">
          <label for="seekManual">手入力</label>
          <input id="seekManual" type="text" autocomplete="off" placeholder="名前を入力" />
          <p class="note">2名以上は半角スペース区切り</p>
        </div>
      </div>
    </section>

    <section class="panel offer-panel" aria-labelledby="offer-title">
      <div class="section-title">
        <span class="heart">♥</span>
        <h2 id="offer-title">譲</h2>
        <span class="kana">ゆずる</span>
        <span class="heart">♥</span>
      </div>

      <div class="input-grid">
        <div class="field">
          <label for="offerSelect">メンバーを選ぶ</label>
          <div class="select-row">
            <select id="offerSelect">
              <option value="">メンバーを選択</option>
            </select>
            <button type="button" class="small-button pink" data-add="offer">追加</button>
          </div>
          <div id="offerChips" class="chips" aria-live="polite"></div>
        </div>

        <div class="field">
          <label for="offerManual">手入力</label>
          <input id="offerManual" type="text" autocomplete="off" placeholder="名前を入力" />
          <p class="note">2名以上は半角スペース区切り</p>
        </div>
      </div>
    </section>

    <section class="actions" aria-label="操作">
      <button type="button" id="createButton" class="primary-button">プレート作成</button>
      <button type="button" id="saveButton" class="secondary-button" disabled>JPEG保存</button>
      <button type="button" id="shareButton" class="secondary-button" disabled>スマホで共有・保存</button>
      <button type="button" id="clearButton" class="text-button">入力クリア</button>
    </section>

    <section class="preview-card" aria-labelledby="preview-title">
      <div class="preview-head">
        <h2 id="preview-title">プレビュー</h2>
        <p>横画面で見やすい 3:2 サイズ</p>
      </div>
      <div class="canvas-wrap">
        <canvas id="plateCanvas" width="1536" height="1024" aria-label="作成した生写真交換プレート"></canvas>
      </div>
      <p class="save-help">名前数に応じて、画像内の文字サイズは自動調整されます。</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
